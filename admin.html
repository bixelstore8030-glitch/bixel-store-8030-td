<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة BIXEL STORE 8030 TD - لوحة الإدارة</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
text-align:center;
direction:rtl;
}
.box{
background:#1f2937;
padding:20px;
margin:20px;
border-radius:10px;
}
input{
padding:10px;
margin:5px;
}
button{
padding:10px;
margin:5px;
cursor:pointer;
background:#f0b90b;
border:none;
}
#usersTable{
width:90%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}
#usersTable th,#usersTable td{
border:1px solid #444;
padding:8px;
color:white;
}
#marketChart{
height:400px;
margin:20px auto;
}
#usersChart{
height:300px;
margin:20px auto;
}
</style>
</head>

<body>

<h1>منصة BIXEL STORE 8030 TD - لوحة الإدارة</h1>

<div class="box">
<h2>إدارة المحفظة</h2>
<input id="userid" placeholder="معرف المستخدم"><br>
<input id="usd" placeholder="مقدار الدولار"><br>
<button onclick="addUSD()">إضافة دولار</button>
<button onclick="removeUSD()">سحب دولار</button>
<button onclick="deleteUser()">حذف المستخدم</button>
</div>

<div class="box">
<h2>إدارة السوق</h2>
<input id="price" placeholder="سعر BX"><br>
<button onclick="setPrice()">تعيين السعر</button>
<button onclick="pump()">رفع السعر ↑</button>
<button onclick="dump()">خفض السعر ↓</button>
</div>

<div class="box">
<h2>قائمة المستخدمين</h2>
<table id="usersTable">
<tr><th>معرف المستخدم</th><th>اسم المستخدم</th><th>دولار</th><th>BX</th></tr>
</table>
</div>

<div class="box">
<h2>الرسم البياني للسوق</h2>
<button onclick="changeTimeframe('1s')">1 ثانية</button>
<button onclick="changeTimeframe('1m')">1 دقيقة</button>
<button onclick="changeTimeframe('1h')">1 ساعة</button>
<button onclick="changeTimeframe('4h')">4 ساعات</button>
<button onclick="changeTimeframe('1d')">1 يوم</button>
<button onclick="changeTimeframe('1w')">1 أسبوع</button>
<br><br>
<button onclick="setSMA(5)">SMA 5</button>
<button onclick="setSMA(10)">SMA 10</button>
<button onclick="setSMA(20)">SMA 20</button>
<button onclick="setSMA(50)">SMA 50</button>
<button onclick="setSMA(100)">SMA 100</button>
<div id="marketChart"></div>
</div>

<div class="box">
<h2>الرسم البياني للمستخدمين</h2>
<div id="usersChart"></div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyC_i-RZQXxwOYCLWBgleHbPK-FfFIcwX5E",
authDomain: "bixel-store-8030-td.firebaseapp.com",
databaseURL: "https://bixel-store-8030-td-default-rtdb.firebaseio.com",
projectId: "bixel-store-8030-td",
storageBucket: "bixel-store-8030-td.firebasestorage.app",
messagingSenderId: "639836655827",
appId: "1:639836655827:web:c20bc92778f75dc2544426"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let candleChart,candleSeries,smaSeries;
let candles=[];
let candleInterval=5000;
let smaPeriod=10;
let timer=null;
let marketMoveInterval=null;

// ====== إنشاء الرسم البياني للسوق ======
function createChart(){
const chartDiv=document.getElementById("marketChart");
candleChart=LightweightCharts.createChart(chartDiv,{
layout:{background:{color:"#111827"},textColor:"#DDD"},
grid:{vertLines:{color:"#1f2937"},horzLines:{color:"#1f2937"}},
rightPriceScale:{borderColor:"#1f2937"},
timeScale:{borderColor:"#1f2937",timeVisible:true,secondsVisible:true},
width:chartDiv.clientWidth,
height:400
});
candleSeries=candleChart.addCandlestickSeries({upColor:"#4CAF50",downColor:"#F44336",borderUpColor:"#4CAF50",borderDownColor:"#F44336",wickUpColor:"#4CAF50",wickDownColor:"#F44336"});
smaSeries=candleChart.addLineSeries({color:"#FFD700",lineWidth:2});
window.addEventListener("resize",()=>{candleChart.applyOptions({width:chartDiv.clientWidth});});
loadCandlesFromDB();
loadPriceFromDB();
startMarketMovement(); // تشغيل تحرك السوق التلقائي
}

// ====== حساب SMA ======
function calcSMA(period){
if(candles.length<period) return [];
let result=[];
for(let i=period-1;i<candles.length;i++){
let sum=0;
for(let j=i-period+1;j<=i;j++) sum+=candles[j].close;
result.push({time:candles[i].time,value:sum/period});
}
return result;
}

// ====== تحديث شمعة ======
function updateCandle(price){
let time=Math.floor(Date.now()/1000);
if(candles.length===0 || time>candles[candles.length-1].time){
let open=candles.length==0?price:candles[candles.length-1].close;
candles.push({time:time,open:open,high:price,low:price,close:price});
}else{
let last=candles[candles.length-1];
last.high=Math.max(last.high,price);
last.low=Math.min(last.low,price);
last.close=price;
}
candleSeries.setData(candles);
smaSeries.setData(calcSMA(smaPeriod));
saveCandlesToDB();
savePriceToDB();
}

// ====== حفظ الشموع والسعر ======
function saveCandlesToDB(){ db.ref("market/candles").set(candles); }
function savePriceToDB(){ db.ref("market/bxprice").set(candles.length>0?candles[candles.length-1].close:1); }

// ====== تحميل الشموع والسعر ======
function loadCandlesFromDB(){
db.ref("market/candles").get().then(snap=>{
if(snap.exists()){ candles = snap.val(); candleSeries.setData(candles); smaSeries.setData(calcSMA(smaPeriod)); }
});
}
function loadPriceFromDB(){
db.ref("market/bxprice").get().then(snap=>{
if(snap.exists()){ updateCandle(snap.val()); }
});
}

// ====== تغيير الفريم الزمني ======
function changeTimeframe(tf){
switch(tf){
case "1s": candleInterval=1000; break;
case "1m": candleInterval=60000; break;
case "1h": candleInterval=3600000; break;
case "4h": candleInterval=14400000; break;
case "1d": candleInterval=86400000; break;
case "1w": candleInterval=604800000; break;
}
restartTimer();
}

// ====== تعديل SMA ======
function setSMA(p){ smaPeriod=p; smaSeries.setData(calcSMA(smaPeriod)); }

// ====== إدارة المستخدم ======
function addUSD(){
let id=document.getElementById("userid").value.trim();
let amount=parseFloat(document.getElementById("usd").value);
if(!id || isNaN(amount)){alert("ادخل بيانات صحيحة");return;}
db.ref("users/"+id).transaction(user=>{ if(user){user.usd=(user.usd||0)+amount;} return user;});
}
function removeUSD(){
let id=document.getElementById("userid").value.trim();
let amount=parseFloat(document.getElementById("usd").value);
if(!id || isNaN(amount)){alert("ادخل بيانات صحيحة");return;}
db.ref("users/"+id).transaction(user=>{ if(user){user.usd=(user.usd||0)-amount;} return user;});
}
function deleteUser(){
let id=document.getElementById("userid").value.trim();
if(!id){alert("ادخل معرف المستخدم");return;}
db.ref("users/"+id).remove();
}

// ====== إدارة السعر ======
function setPrice(){ let p=parseFloat(document.getElementById("price").value); if(!isNaN(p)) updateCandle(p); }
function pump(){ db.ref("market/bxprice").transaction(v=>v===null?1:v+0.1); }
function dump(){ db.ref("market/bxprice").transaction(v=>{ if(v===null) return 1; let n=v-0.1; return n<0.1?0.1:n; }); }

// ====== تحميل وعرض المستخدمين ======
function loadUsers(){
db.ref("users").on("value",snapshot=>{
let table=document.getElementById("usersTable");
table.innerHTML="<tr><th>معرف المستخدم</th><th>اسم المستخدم</th><th>دولار</th><th>BX</th></tr>";
let data=snapshot.val(); if(!data) return;
for(let key in data){
let user=data[key];
let row=table.insertRow();
row.insertCell(0).innerText=key;
row.insertCell(1).innerText=user.username||"";
row.insertCell(2).innerText=user.usd||0;
row.insertCell(3).innerText=user.bx||0;
}
updateUsersChart(data);
});
}

// ====== رسم بيانات المستخدمين ======
const usersChart=LightweightCharts.createChart(document.getElementById("usersChart"),{width:600,height:300,layout:{background:{color:"#111827"},textColor:"#DDD"}});
const usdSeries=usersChart.addLineSeries();
const bxSeries=usersChart.addLineSeries();

function updateUsersChart(data){
if(!data) return;
let usd=[], bx=[], t=1;
Object.keys(data).forEach(key=>{
let d=data[key];
usd.push({time:t,value:Number(d.usd||0)});
bx.push({time:t,value:Number(d.bx||0)});
t++;
});
usdSeries.setData(usd);
bxSeries.setData(bx);
}

// ====== مؤقت لتحديث السوق ======
function startTimer(){ if(timer) clearInterval(timer); timer=setInterval(()=>{
db.ref("market/bxprice").get().then(snapshot=>{ if(snapshot.exists()) updateCandle(snapshot.val()); });
},candleInterval); }
function restartTimer(){ clearInterval(timer); startTimer(); }

// ====== تحرك السوق التلقائي أضعف ======
function startMarketMovement(){
if(marketMoveInterval) clearInterval(marketMoveInterval);
marketMoveInterval=setInterval(()=>{
db.ref("market/bxprice").get().then(snapshot=>{
let currentPrice=snapshot.exists()?snapshot.val():1;
// تعديل الحركة لتصبح أضعف: ±0.02 بدل ±0.05
let delta=(Math.random()*0.04)-0.02;
let newPrice=Math.max(0.1,currentPrice+delta);
updateCandle(newPrice);
db.ref("market/bxprice").set(newPrice);
});
},1000);
}

// ====== تشغيل عند التحميل ======
createChart();
startTimer();
loadUsers();
</script>

</body>
</html>
