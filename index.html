<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة BIXEL STORE 8030 TD</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0b0e11;
color:white;
font-family:Tahoma;
text-align:center;
direction:rtl;
}

.box{
background:#1e2329;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:#f0b90b;
border:none;
}

</style>
</head>

<body>

<h1>منصة BIXEL STORE 8030 TD</h1>

<div class="box">

<h2>تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>

<button onclick="login()">دخول</button>

</div>

<div class="box">

<h2>إنشاء حساب جديد</h2>

<input id="newuser" placeholder="اسم المستخدم"><br>
<input id="newpass" placeholder="كلمة المرور"><br>

<button onclick="register()">تسجيل</button>

</div>

<div id="panel" style="display:none">

<div class="box">

<h2>المحفظة</h2>

الدولار: <span id="usd">0</span><br>
عملة BX: <span id="bx">0</span><br>
سعر BX: <span id="price">0</span>

</div>

<div class="box">

<h2>التداول</h2>

<input id="amount" placeholder="عدد عملة BX">

<br>

<button onclick="buy()">شراء BX</button>

<button onclick="sell()">بيع BX</button>

</div>

<div class="box">

<h2>الرسم البياني</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC_i-RZQXxwOYCLWBgleHbPK-FfFIcwX5E",
authDomain: "bixel-store-8030-td.firebaseapp.com",
projectId: "bixel-store-8030-td",
storageBucket: "bixel-store-8030-td.firebasestorage.app",
messagingSenderId: "639836655827",
appId: "1:639836655827:web:c20bc92778f75dc2544426"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let currentUser=null;
let price=1;

function register(){

let u=document.getElementById("newuser").value
let p=document.getElementById("newpass").value

db.collection("users").add({

username:u,
password:p,
usd:0,
bx:0

})

alert("تم إنشاء الحساب")

}

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

db.collection("users").get().then(snapshot=>{

snapshot.forEach(doc=>{

let data=doc.data()

if(data.username==u && data.password==p){

currentUser=doc.id

document.getElementById("panel").style.display="block"

loadWallet()

}

})

})

}

function loadWallet(){

db.collection("users").doc(currentUser).onSnapshot(doc=>{

let data=doc.data()

document.getElementById("usd").innerText=data.usd
document.getElementById("bx").innerText=data.bx

})

}

function loadPrice(){

db.collection("market").doc("bxprice").onSnapshot(doc=>{

price=doc.data().price

document.getElementById("price").innerText=price

updateChart(price)

})

}

function buy(){

let amount=parseFloat(document.getElementById("amount").value)

db.collection("users").doc(currentUser).get().then(doc=>{

let data=doc.data()

let cost=amount*price

if(data.usd>=cost){

db.collection("users").doc(currentUser).update({

usd:data.usd-cost,
bx:data.bx+amount

})

}

})

}

function sell(){

let amount=parseFloat(document.getElementById("amount").value)

db.collection("users").doc(currentUser).get().then(doc=>{

let data=doc.data()

if(data.bx>=amount){

db.collection("users").doc(currentUser).update({

usd:data.usd+(amount*price),
bx:data.bx-amount

})

}

})

}

let chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:[],
datasets:[{
label:"BX",
data:[]
}]
}

})

function updateChart(p){

chart.data.labels.push("t")
chart.data.datasets[0].data.push(p)

chart.update()

}

loadPrice()

</script>

</body>
</html>
