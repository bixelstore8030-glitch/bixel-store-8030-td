<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة BIXEL STORE 8030 TD</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
background:#0b0e11;
color:white;
font-family:tahoma;
text-align:center;
direction:rtl;
margin:0;
padding:0;
}

.box{
background:#1e2329;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:#f0b90b;
border:none;
}

#candlestickChart{
width:100%;
height:400px;
}
</style>
</head>

<body>

<h1>منصة BIXEL STORE</h1>

<div class="box">
<h2>تسجيل الدخول</h2>
<input id="username" placeholder="اسم المستخدم"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>
<button id="loginBtn">دخول</button>
</div>

<div class="box">
<h2>إنشاء حساب</h2>
<input id="newuser" placeholder="اسم المستخدم"><br>
<input id="newpass" type="password" placeholder="كلمة المرور"><br>
<button id="registerBtn">تسجيل</button>
</div>

<div id="panel" style="display:none">

<div class="box">
<h2>المحفظة</h2>
الدولار: <span id="usd">0</span><br>
BX: <span id="bx">0</span><br>
سعر BX: <span id="price">0</span>
</div>

<div class="box">
<h2>التداول</h2>
<input id="amount" placeholder="عدد BX"><br>
<button id="buyBtn">شراء</button>
<button id="sellBtn">بيع</button>
</div>

<div class="box">
<h2>الرسم البياني للمستخدمين</h2>
<canvas id="chart"></canvas>
</div>

<div class="box">
<h2>الرسم البياني للسوق</h2>
<div id="candlestickChart"></div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyC_i-RZQXxwOYCLWBgleHbPK-FfFIcwX5E",
authDomain:"bixel-store-8030-td.firebaseapp.com",
databaseURL:"https://bixel-store-8030-td-default-rtdb.firebaseio.com",
projectId:"bixel-store-8030-td",
storageBucket:"bixel-store-8030-td.firebasestorage.app",
messagingSenderId:"639836655827",
appId:"1:639836655827:web:c20bc92778f75dc2544426"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentUser=null;
let price=1;

let chart;
let candleSeries;
let candles=[];
let lastCandleTime=0;
let candleDuration=5;

let marketInterval=null;

function register(){

let u=document.getElementById("newuser").value.trim();
let p=document.getElementById("newpass").value.trim();

if(!u||!p){
alert("ادخل البيانات");
return;
}

db.ref("users/"+u).get().then(snap=>{

if(snap.exists()){
alert("المستخدم موجود");
return;
}

db.ref("users/"+u).set({
username:u,
password:p,
usd:0,
bx:0
});

alert("تم إنشاء الحساب");

});

}

function login(){

let u=document.getElementById("username").value.trim();
let p=document.getElementById("password").value.trim();

db.ref("users/"+u).get().then(snap=>{

if(!snap.exists()){
alert("المستخدم غير موجود");
return;
}

let data=snap.val();

if(data.password!==p){
alert("كلمة المرور خطأ");
return;
}

currentUser=u;

document.getElementById("panel").style.display="block";

loadWallet();
listenPrice();   // 👈 هنا التعديل المهم
startChart();
loadCandles();
startMarketMovement();

});

}

function loadWallet(){

db.ref("users/"+currentUser).on("value",snap=>{

let d=snap.val();

document.getElementById("usd").innerText=parseFloat(d.usd).toFixed(2);
document.getElementById("bx").innerText=parseFloat(d.bx).toFixed(6);

});

}

function listenPrice(){

db.ref("market/bxprice").on("value",snap=>{

if(!snap.exists()){
db.ref("market/bxprice").set(1);
return;
}

price=snap.val();

document.getElementById("price").innerText=price.toFixed(2);

updateCandle(price);

});

}

function loadCandles(){

db.ref("market/candles").once("value").then(snap=>{

if(snap.exists()){

candles=snap.val();
candleSeries.setData(candles);

}

});

}

function saveCandles(){
db.ref("market/candles").set(candles);
}

function buy(){

let amount=parseFloat(document.getElementById("amount").value);
if(!amount)return;

db.ref("users/"+currentUser).transaction(user=>{

if(!user)return user;

let cost=amount*price;

if(user.usd<cost){
alert("لا يوجد دولار كافي");
return user;
}

user.usd=parseFloat((user.usd-cost).toFixed(2));
user.bx=parseFloat((user.bx+amount).toFixed(6));

return user;

});

db.ref("market/bxprice").transaction(p=>{
if(!p)p=1;
return p + (amount/2000);
});

}

function sell(){

let amount=parseFloat(document.getElementById("amount").value);
if(!amount)return;

db.ref("users/"+currentUser).transaction(user=>{

if(!user)return user;

if(user.bx<amount){
alert("لا يوجد BX كافي");
return user;
}

user.bx=parseFloat((user.bx-amount).toFixed(6));
user.usd=parseFloat((user.usd+amount*price).toFixed(2));

return user;

});

db.ref("market/bxprice").transaction(p=>{
if(!p)p=1;
return Math.max(0.1,p-(amount/2000));
});

}

function startMarketMovement(){

if(marketInterval) clearInterval(marketInterval);

marketInterval=setInterval(()=>{

db.ref("market/bxprice").transaction(p=>{

if(!p)p=1;

let delta=(Math.random()*0.02)-0.01;

return Math.max(0.1,p+delta);

});

},2000);

}

function startChart(){

const container=document.getElementById("candlestickChart");

chart=LightweightCharts.createChart(container,{
width:container.clientWidth,
height:400,
layout:{
background:{color:"#0b0e11"},
textColor:"#DDD"
}
});

candleSeries=chart.addCandlestickSeries();

}

function updateCandle(newPrice){

let time=Math.floor(Date.now()/1000);

if(candles.length===0){

candles.push({
time:time,
open:newPrice,
high:newPrice,
low:newPrice,
close:newPrice
});

lastCandleTime=time;

}else{

let last=candles[candles.length-1];

if(time-lastCandleTime>=candleDuration){

candles.push({
time:time,
open:last.close,
high:newPrice,
low:newPrice,
close:newPrice
});

lastCandleTime=time;

}else{

last.high=Math.max(last.high,newPrice);
last.low=Math.min(last.low,newPrice);
last.close=newPrice;

}

}

candleSeries.setData(candles);
saveCandles();

}

window.onload=function(){

document.getElementById("loginBtn").onclick=login;
document.getElementById("registerBtn").onclick=register;
document.getElementById("buyBtn").onclick=buy;
document.getElementById("sellBtn").onclick=sell;

}

</script>

</body>
</html>
