<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة BIXEL STORE 8030 TD</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
background:#0b0e11;
color:white;
font-family:Tahoma;
text-align:center;
direction:rtl;
margin:0;
padding:0;
}
.box{
background:#1e2329;
padding:20px;
margin:20px;
border-radius:10px;
}
input{
padding:10px;
margin:5px;
width:200px;
}
button{
padding:10px;
margin:5px;
cursor:pointer;
background:#f0b90b;
border:none;
}
#candlestickChart{
width: 100%; 
height: 400px;
}
#timeframeButtons button, #smaButtons button{
padding:5px 10px;
margin:3px;
}
</style>
</head>

<body>

<h1>منصة BIXEL STORE 8030 TD</h1>

<div class="box">
<h2>تسجيل الدخول</h2>
<input id="username" placeholder="اسم المستخدم"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>
<button onclick="login()">دخول</button>
</div>

<div class="box">
<h2>إنشاء حساب جديد</h2>
<input id="newuser" placeholder="اسم المستخدم"><br>
<input id="newpass" type="password" placeholder="كلمة المرور"><br>
<button onclick="register()">تسجيل</button>
</div>

<div id="panel" style="display:none">

<div class="box">
<h2>المحفظة</h2>
الدولار: <span id="usd">0</span><br>
عملة BX: <span id="bx">0</span><br>
سعر BX: <span id="price">0</span>
</div>

<div class="box">
<h2>التداول</h2>
<input id="amount" placeholder="عدد عملة BX"><br>
<button onclick="buy()">شراء BX</button>
<button onclick="sell()">بيع BX</button>
</div>

<div class="box">
<h2>الرسم البياني لكل مستخدم</h2>
<canvas id="chart"></canvas>
</div>

<div class="box">
<h2>الرسم البياني للسوق (شموع + SMA)</h2>

<div id="timeframeButtons">
<button onclick="changeTimeframe('1s')">1 ثانية</button>
<button onclick="changeTimeframe('1m')">1 دقيقة</button>
<button onclick="changeTimeframe('1h')">1 ساعة</button>
<button onclick="changeTimeframe('4h')">4 ساعات</button>
<button onclick="changeTimeframe('1d')">1 يوم</button>
<button onclick="changeTimeframe('3d')">3 أيام</button>
<button onclick="changeTimeframe('1w')">1 أسبوع</button>
</div>

<div id="smaButtons">
<button onclick="setSMA(5)">SMA 5</button>
<button onclick="setSMA(10)">SMA 10</button>
<button onclick="setSMA(20)">SMA 20</button>
<button onclick="setSMA(30)">SMA 30</button>
<button onclick="setSMA(50)">SMA 50</button>
<button onclick="setSMA(100)">SMA 100</button>
</div>

<div id="candlestickChart"></div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyC_i-RZQXxwOYCLWBgleHbPK-FfFIcwX5E",
authDomain: "bixel-store-8030-td.firebaseapp.com",
projectId: "bixel-store-8030-td",
storageBucket: "bixel-store-8030-td.firebasestorage.app",
messagingSenderId: "639836655827",
appId: "1:639836655827:web:c20bc92778f75dc2544426"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser=null;
let price=1;

// ---- الشموع + SMA ----
let candleChart,candleSeries,smaSeries,candles=[],candleInterval=1000,candleTimer=null,smaPeriod=10;

// ---- رسم المستخدمين ----
let chartCanvas=document.getElementById("chart");
let usersChart=new Chart(chartCanvas,{
type:"line",
data:{labels:[],datasets:[]},
options:{responsive:true}
});

// ---- تسجيل المستخدم ----
function register(){
let u=document.getElementById("newuser").value.trim();
let p=document.getElementById("newpass").value.trim();
if(!u||!p){ alert("ادخل البيانات"); return; }
db.collection("users").doc(u).get().then(doc=>{
if(doc.exists){ alert("المستخدم موجود"); }
else{
db.collection("users").doc(u).set({username:u,password:p,usd:0,bx:0}).then(()=>{ alert("تم إنشاء الحساب"); });
}
});
}

// ---- تسجيل الدخول ----
function login(){
let u=document.getElementById("username").value.trim();
let p=document.getElementById("password").value.trim();
db.collection("users").doc(u).get().then(doc=>{
if(doc.exists && doc.data().password===p){
currentUser=u;
document.getElementById("panel").style.display="block";
loadWallet();
loadPrice();
loadUsersChart();
initializeCandlestickChart();
startCandleTimer();
}
else{ alert("خطأ تسجيل الدخول"); }
});
}

// ---- تحديث المحفظة مباشرة ----
function loadWallet(){
if(!currentUser) return;
db.collection("users").doc(currentUser).onSnapshot(doc=>{
if(doc.exists){
let data=doc.data();
document.getElementById("usd").innerText=data.usd;
document.getElementById("bx").innerText=data.bx;
}
});
}

// ---- تحديث سعر السوق ----
function loadPrice(){
db.collection("market").doc("bxprice").onSnapshot(doc=>{
if(doc.exists){
price=doc.data().price;
document.getElementById("price").innerText=price;
}
});
}

// ---- شراء وبيع ----
function buy(){
let amount=parseFloat(document.getElementById("amount").value);
if(!amount || amount<=0){ alert("ادخل رقم صحيح"); return; }
db.collection("users").doc(currentUser).get().then(doc=>{
let data=doc.data();
let cost=amount*price;
if(data.usd>=cost){
db.collection("users").doc(currentUser).update({
usd: firebase.firestore.FieldValue.increment(-cost),
bx: firebase.firestore.FieldValue.increment(amount)
}).then(()=>{ updateMarketPriceSmart(); });
}else{ alert("لا يوجد دولار كافي"); }
});
}

function sell(){
let amount=parseFloat(document.getElementById("amount").value);
if(!amount || amount<=0){ alert("ادخل رقم صحيح"); return; }
db.collection("users").doc(currentUser).get().then(doc=>{
let data=doc.data();
if(data.bx>=amount){
db.collection("users").doc(currentUser).update({
usd: firebase.firestore.FieldValue.increment(amount*price),
bx: firebase.firestore.FieldValue.increment(-amount)
}).then(()=>{ updateMarketPriceSmart(); });
}else{ alert("لا يوجد BX"); }
});
}

// ---- تحديث السعر الذكي ----
function updateMarketPriceSmart(){
db.collection("users").get().then(snapshot=>{
let totalBX=0;
snapshot.forEach(doc=>{ totalBX+=doc.data().bx; });
let newPrice=parseFloat((1+(50-totalBX)/500).toFixed(2));
if(newPrice<0.1) newPrice=0.1;
db.collection("market").doc("bxprice").set({price:newPrice});
});
}

// ---- رسم بياني لكل مستخدم ----
function loadUsersChart(){
db.collection("users").onSnapshot(snapshot=>{
let timeLabel=new Date().toLocaleTimeString();
usersChart.data.labels.push(timeLabel);
snapshot.forEach(doc=>{
let data=doc.data();
let dataset=usersChart.data.datasets.find(d=>d.label===data.username);
if(!dataset){
let color='hsl('+Math.random()*360+',70%,50%)';
usersChart.data.datasets.push({label:data.username,data:[data.bx],borderColor:color,backgroundColor:color,fill:false});
}else{ dataset.data.push(data.bx); }
});
usersChart.update();
});
}

// ---- الشموع + SMA ----
function initializeCandlestickChart(){
const chartDiv=document.getElementById("candlestickChart");
candleChart=LightweightCharts.createChart(chartDiv,{layout:{background:{color:'#0b0e11'},textColor:'#DDD'},width:chartDiv.clientWidth,height:400});
candleSeries=candleChart.addCandlestickSeries();
smaSeries=candleChart.addLineSeries({color:'#FFD700'});
}

function calculateSMA(period){
if(candles.length<period) return [];
let sma=[];
for(let i=period-1;i<candles.length;i++){
let sum=0;
for(let j=i-period+1;j<=i;j++){ sum+=candles[j].close; }
sma.push({time:candles[i].time,value:sum/period});
}
return sma;
}

function addOrUpdateCandle(newPrice){
let timestamp=Math.floor(Date.now()/1000);
if(candles.length===0 || timestamp>candles[candles.length-1].time){
let open=candles.length===0?newPrice:candles[candles.length-1].close;
candles.push({time:timestamp,open:open,high:newPrice,low:newPrice,close:newPrice});
}else{
let last=candles[candles.length-1];
last.high=Math.max(last.high,newPrice);
last.low=Math.min(last.low,newPrice);
last.close=newPrice;
}
candleSeries.setData(candles);
smaSeries.setData(calculateSMA(smaPeriod));
}

function startCandleTimer(){
if(candleTimer) clearInterval(candleTimer);
candleTimer=setInterval(()=>{
db.collection("market").doc("bxprice").get().then(doc=>{
if(doc.exists){ addOrUpdateCandle(doc.data().price); }
});
},candleInterval);
}

function restartCandleTimer(){
clearInterval(candleTimer);
startCandleTimer();
}

function changeTimeframe(tf){
switch(tf){
case '1s': candleInterval=1000; break;
case '1m': candleInterval=60000; break;
case '1h': candleInterval=3600000; break;
case '4h': candleInterval=14400000; break;
case '1d': candleInterval=86400000; break;
case '3d': candleInterval=259200000; break;
case '1w': candleInterval=604800000; break;
}
restartCandleTimer();
}

function setSMA(period){
smaPeriod=period;
smaSeries.setData(calculateSMA(smaPeriod));
}
</script>

</body>
</html>
